<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>다산씨엔텍 채용 허브 | 현성그룹</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --ink:#0D1B2A;--ink2:#1A2E45;
  --teal:#0B7285;--teal-mid:#0E8FA5;--teal-soft:#E0F5F8;--teal-pale:#F0FAFB;
  --gold:#B8912A;--gold-light:#F0D58C;--gold-pale:#FDF6E3;
  --off:#F8F7F4;--bg:#F2F4F7;
  --border:#E4E1D9;--border2:#D5D2CA;
  --mid:#5C6370;--light:#9AA0AC;
  --green:#059669;--green-bg:#ECFDF5;
  --red:#DC2626;--red-bg:#FEF2F2;
  --sidebar-w:268px;--topbar-h:52px;
}
html,body{height:100%;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.6;}
.layout{display:flex;height:100vh;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--ink);display:flex;flex-direction:column;overflow-y:auto;position:relative;}
.sb-brand{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0;}
.sb-brand-mark{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:4px;}
.sb-brand-name{font-size:15px;font-weight:700;color:#fff;}
.sb-brand-sub{font-size:11px;color:rgba(255,255,255,.3);margin-top:2px;}
.sb-section{padding:18px 20px 6px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.22);}
.sb-job{margin:2px 10px;border-radius:6px;overflow:hidden;cursor:pointer;transition:background .15s;position:relative;}
.sb-job-head{display:flex;align-items:center;gap:10px;padding:10px 12px;}
.sb-job-head:hover{background:rgba(255,255,255,.05);}
.sb-job.active .sb-job-head{background:rgba(11,114,133,.3);}
.sb-job-icon{width:32px;height:32px;border-radius:6px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.sb-job.active .sb-job-icon{background:var(--teal);}
.sb-job-info{flex:1;min-width:0;}
.sb-job-title{font-size:12px;font-weight:600;color:rgba(255,255,255,.85);line-height:1.3;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-job-meta{font-size:10px;color:rgba(255,255,255,.35);}
.sb-job-badge{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;background:var(--green);color:#fff;padding:2px 7px;border-radius:8px;flex-shrink:0;}
.sb-job-badge.closed{background:rgba(255,255,255,.15);color:rgba(255,255,255,.4);}
/* 관리자 모드 공고 액션 버튼 */
.sb-job-actions{display:none;position:absolute;right:8px;top:50%;transform:translateY(-50%);gap:4px;z-index:10;}
body.admin-mode .sb-job-actions{display:flex;}
body.admin-mode .sb-job-head{padding-right:80px;}
.sb-action-btn{width:24px;height:24px;border-radius:4px;border:none;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.sb-action-copy{background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);}
.sb-action-copy:hover{background:rgba(11,114,133,.5);color:#fff;}
.sb-action-del{background:rgba(255,255,255,.1);color:rgba(255,255,255,.4);}
.sb-action-del:hover{background:rgba(220,38,38,.5);color:#fff;}
.sb-divider{border:none;border-top:1px solid rgba(255,255,255,.07);margin:10px 0;}
.sb-link{display:flex;align-items:center;gap:9px;padding:8px 20px;font-size:12px;color:rgba(255,255,255,.45);cursor:pointer;text-decoration:none;transition:color .15s;}
.sb-link:hover{color:rgba(255,255,255,.8);}
.sb-link-icon{font-size:14px;width:18px;text-align:center;}
.sb-footer{margin-top:auto;padding:16px 20px;border-top:1px solid rgba(255,255,255,.07);flex-shrink:0;}
.sb-footer p{font-size:10px;color:rgba(255,255,255,.2);line-height:1.7;}
.sb-admin-btn{margin:8px 12px 4px;padding:8px 12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:6px;color:rgba(255,255,255,.35);font-size:11px;cursor:pointer;font-family:inherit;text-align:left;width:calc(100% - 24px);transition:all .15s;}
.sb-admin-btn:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{height:var(--topbar-h);flex-shrink:0;background:#fff;border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;}
.topbar-breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--light);}
.topbar-breadcrumb span{color:var(--mid);}
.topbar-breadcrumb .sep{color:var(--border2);}
.topbar-actions{display:flex;align-items:center;gap:10px;}
.topbar-apply-btn{display:inline-flex;align-items:center;gap:6px;background:var(--teal);color:#fff;font-size:12px;font-weight:700;padding:8px 18px;border-radius:5px;text-decoration:none;cursor:pointer;border:none;font-family:inherit;transition:background .15s;}
.topbar-apply-btn:hover{background:var(--teal-mid);}
.topbar-link{font-size:12px;color:var(--mid);text-decoration:none;}
.topbar-link:hover{color:var(--teal);}
.content{flex:1;overflow-y:auto;}

/* ── JOB PANELS ── */
.job-panel{display:none;}
.job-panel.active{display:block;}

/* JOB HERO */
.job-hero{background:linear-gradient(135deg,#0D1B2A 0%,#1A3A5C 55%,#0B6070 100%);padding:40px 48px 36px;position:relative;overflow:hidden;}
.job-hero-orb1{position:absolute;top:-60px;right:-40px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(11,114,133,.25) 0%,transparent 65%);pointer-events:none;}
.job-hero-orb2{position:absolute;bottom:-40px;left:5%;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(184,145,42,.14) 0%,transparent 65%);pointer-events:none;}
.job-hero-badge{display:inline-flex;align-items:center;gap:6px;background:var(--teal);color:#fff;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:4px 12px;border-radius:2px;margin-bottom:14px;}
.job-hero-dept{color:rgba(255,255,255,.4);font-size:12px;margin-bottom:8px;}
.job-hero-title{font-family:'DM Serif Display',serif;color:#fff;font-size:30px;line-height:1.25;margin-bottom:10px;position:relative;z-index:1;}
.job-hero-title em{color:var(--gold-light);font-style:normal;}
.job-hero-chips{display:flex;flex-wrap:wrap;gap:7px;position:relative;z-index:1;}
.chip{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);color:rgba(255,255,255,.82);font-size:12px;padding:5px 12px;border-radius:16px;}

/* BODY SECTIONS */
.job-body{padding:32px 48px 60px;}
.jb-section{margin-bottom:36px;}
.jb-hd{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.jb-bar{width:4px;height:20px;background:var(--teal);border-radius:2px;flex-shrink:0;}
.jb-title{font-family:'DM Serif Display',serif;font-size:20px;color:var(--ink);}

/* INFO TABLE */
.info-table{width:100%;border-collapse:collapse;border-radius:8px;overflow:hidden;border:1px solid var(--border);}
.info-table tr{border-bottom:1px solid var(--border);}
.info-table tr:last-child{border-bottom:none;}
.info-table td:first-child{width:130px;padding:12px 16px;background:var(--off);font-size:12px;font-weight:700;color:var(--mid);}
.info-table td:last-child{padding:12px 16px;font-size:14px;color:var(--ink);}
.info-badge{display:inline-flex;align-items:center;background:var(--teal-soft);color:var(--teal);font-size:12px;font-weight:700;padding:3px 10px;border-radius:10px;margin-right:5px;}
.info-badge.gold{background:var(--gold-pale);color:var(--gold);}
.info-badge.green{background:var(--green-bg);color:var(--green);}

/* CALLOUT */
.callout{background:var(--gold-pale);border-left:3px solid var(--gold);border-radius:4px;padding:14px 18px;font-size:13.5px;color:var(--ink);line-height:1.8;margin-bottom:20px;display:flex;gap:10px;}
.callout-icon{font-size:18px;flex-shrink:0;}

/* DUTY GRID */
.duty-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.duty-item{display:flex;align-items:flex-start;gap:10px;background:#fff;border:1.5px solid var(--teal-soft);border-left:4px solid var(--teal);border-radius:6px;padding:14px 16px;font-size:14px;font-weight:500;color:var(--ink);line-height:1.5;box-shadow:0 1px 4px rgba(11,114,133,.06);}
.duty-item::before{content:'▸';color:var(--teal);flex-shrink:0;margin-top:1px;font-size:13px;}

/* QUAL */
.qual-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.qual-box{border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.qual-box-head{padding:10px 16px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.qual-box-head.req{background:var(--ink);color:#fff;}
.qual-box-head.pref{background:var(--teal);color:#fff;}
.qual-box-body{padding:14px 16px;}
.qual-item{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:var(--mid);margin-bottom:8px;line-height:1.55;}
.qual-item:last-child{margin-bottom:0;}
.qdot{width:5px;height:5px;border-radius:50%;background:var(--teal);flex-shrink:0;margin-top:6px;}

/* BENEFIT KANBAN */
.benefit-kanban{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.benefit-col{background:#fff;border:1px solid var(--border);border-radius:8px;padding:16px;}
.bc-title{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--mid);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.bc-card{background:var(--off);border:1px solid var(--border);border-radius:5px;padding:8px 12px;margin-bottom:6px;font-size:12.5px;color:var(--mid);display:flex;align-items:center;gap:6px;}
.bc-card:last-child{margin-bottom:0;}
.culture-note{background:#FFFBEB;border:1px solid #FDE68A;border-radius:6px;padding:13px 16px;font-size:13px;color:#92400E;display:flex;align-items:center;gap:8px;}

/* PROCESS */
.proc-wrap{display:flex;align-items:flex-start;gap:0;position:relative;padding:8px 0;}
.proc-wrap::before{content:'';position:absolute;left:27px;top:54px;bottom:24px;width:2px;background:linear-gradient(180deg,var(--teal),rgba(11,114,133,.1));border-radius:1px;}
.proc-item{display:flex;gap:16px;margin-bottom:24px;position:relative;z-index:1;width:100%;}
.proc-item:last-child{margin-bottom:0;}
.proc-num{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;position:relative;z-index:1;border:3px solid;}
.proc-num.n1{background:var(--ink);border-color:var(--teal);box-shadow:0 0 0 4px rgba(11,114,133,.12);}
.proc-num.n2{background:var(--teal);border-color:var(--teal-mid);box-shadow:0 0 0 4px rgba(11,114,133,.15);}
.proc-num.n3{background:linear-gradient(135deg,var(--gold),#D4A843);border-color:var(--gold);box-shadow:0 0 0 4px rgba(184,145,42,.15);}
.proc-step-badge{position:absolute;top:-4px;right:-4px;width:18px;height:18px;border-radius:50%;font-size:9px;font-weight:900;color:#fff;display:flex;align-items:center;justify-content:center;border:2px solid #fff;}
.n1 .proc-step-badge{background:var(--teal);}
.n2 .proc-step-badge{background:var(--teal-mid);}
.n3 .proc-step-badge{background:var(--gold);}
.proc-content{padding:12px 0 0;}
.proc-title{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:3px;}
.proc-sub{font-size:12.5px;color:var(--mid);}

/* APPLY CTA */
.apply-cta{background:var(--ink);border-radius:10px;padding:32px;text-align:center;margin-top:8px;}
.apply-cta-title{font-family:'DM Serif Display',serif;color:#fff;font-size:20px;margin-bottom:6px;}
.apply-cta-sub{color:rgba(255,255,255,.45);font-size:13px;margin-bottom:22px;}
.apply-cta-btn{display:inline-flex;align-items:center;gap:8px;background:var(--gold-light);color:var(--ink);font-size:14px;font-weight:800;padding:13px 40px;border-radius:5px;text-decoration:none;cursor:pointer;border:none;font-family:inherit;transition:opacity .15s;}
.apply-cta-btn:hover{opacity:.9;}
.apply-cta-contact{color:rgba(255,255,255,.25);font-size:12px;margin-top:12px;}

/* ── 관리자 모드 ── */
body.admin-mode [contenteditable="true"]{outline:2px dashed rgba(11,114,133,.4);border-radius:3px;cursor:text;transition:outline .15s;}
body.admin-mode [contenteditable="true"]:hover{outline:2px solid var(--teal);background:rgba(11,114,133,.03);}
body.admin-mode [contenteditable="true"]:focus{outline:2px solid var(--teal-mid);background:rgba(11,114,133,.05);}

/* 관리자 바 */
.admin-bar{display:none;position:fixed;bottom:0;left:0;right:0;z-index:9999;background:#1E293B;border-top:2px solid var(--teal);padding:10px 24px;align-items:center;gap:10px;flex-wrap:wrap;}
.admin-bar.show{display:flex;}
.admin-bar-label{font-size:12px;font-weight:700;color:var(--gold-light);letter-spacing:1px;text-transform:uppercase;}
.admin-bar-tip{font-size:11px;color:rgba(255,255,255,.35);flex:1;}
.admin-btn{display:flex;align-items:center;gap:5px;padding:8px 14px;border-radius:5px;border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;transition:all .15s;}
.admin-btn-add{background:#059669;color:#fff;}
.admin-btn-add:hover{background:#047857;}
.admin-btn-save{background:var(--teal);color:#fff;}
.admin-btn-save:hover{background:var(--teal-mid);}
.admin-btn-exit{background:transparent;color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.2);}
.admin-btn-exit:hover{color:#fff;border-color:rgba(255,255,255,.5);}

/* 비밀번호 모달 */
.pw-modal-bg{display:none;position:fixed;inset:0;z-index:10000;background:rgba(13,27,42,.7);backdrop-filter:blur(4px);align-items:center;justify-content:center;}
.pw-modal-bg.show{display:flex;}
.pw-modal{background:#fff;border-radius:10px;padding:32px;width:340px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.3);}
.pw-modal-title{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:6px;}
.pw-modal-sub{font-size:12px;color:var(--mid);margin-bottom:20px;}
.pw-input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:6px;font-family:inherit;font-size:14px;text-align:center;letter-spacing:4px;outline:none;margin-bottom:8px;}
.pw-input:focus{border-color:var(--teal);}
.pw-error{font-size:12px;color:#DC2626;margin-bottom:8px;min-height:18px;}
.pw-submit{width:100%;padding:11px;background:var(--teal);color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:8px;}
.pw-submit:hover{background:var(--teal-mid);}
.pw-cancel{width:100%;padding:9px;background:transparent;color:var(--mid);border:1px solid var(--border);border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit;}

/* 공고 추가 모달 */
.add-modal-bg{display:none;position:fixed;inset:0;z-index:10000;background:rgba(13,27,42,.7);backdrop-filter:blur(4px);align-items:center;justify-content:center;}
.add-modal-bg.show{display:flex;}
.add-modal{background:#fff;border-radius:12px;padding:28px 32px;width:520px;max-height:85vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.3);}
.add-modal-title{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:4px;}
.add-modal-sub{font-size:12px;color:var(--mid);margin-bottom:22px;}
.add-field{margin-bottom:14px;}
.add-label{font-size:11px;font-weight:700;color:var(--mid);letter-spacing:.5px;margin-bottom:5px;display:block;}
.add-input{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:6px;font-family:inherit;font-size:13px;outline:none;}
.add-input:focus{border-color:var(--teal);}
.add-textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:6px;font-family:inherit;font-size:13px;outline:none;resize:vertical;min-height:80px;}
.add-textarea:focus{border-color:var(--teal);}
.add-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.add-actions{display:flex;gap:8px;margin-top:20px;}
.add-btn-confirm{flex:1;padding:11px;background:var(--teal);color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.add-btn-confirm:hover{background:var(--teal-mid);}
.add-btn-cancel{padding:11px 18px;background:#fff;color:var(--mid);border:1px solid var(--border);border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit;}

/* TOAST */
.toast{position:fixed;bottom:80px;right:24px;z-index:10001;background:var(--ink);color:#fff;padding:12px 20px;border-radius:6px;font-size:13px;display:none;align-items:center;gap:8px;box-shadow:0 4px 16px rgba(0,0,0,.3);}
.toast.show{display:flex;}

/* MOBILE */
.mobile-topbar{display:none;}
@media(max-width:768px){
  .sidebar{display:none;}
  .mobile-topbar{display:flex;align-items:center;justify-content:space-between;background:var(--ink);padding:14px 20px;flex-shrink:0;}
  .mobile-logo{font-size:14px;font-weight:700;color:#fff;}
  .mobile-menu-btn{background:none;border:none;color:rgba(255,255,255,.6);font-size:20px;cursor:pointer;}
  .job-body{padding:24px 20px 40px;}
  .job-hero{padding:28px 20px 24px;}
  .duty-grid,.qual-grid,.benefit-kanban{grid-template-columns:1fr;}
  .topbar{padding:0 20px;}
}
</style>
</head>

  <div class="pw-modal">

let currentJobId = null;

function renderAll() {
  renderSidebar();
  renderPanels();
  // 첫 번째 공고 자동 선택
  if (JOBS.length > 0) {
    const first = JOBS[0].id;
    if (currentJobId && JOBS.find(j => j.id === currentJobId)) {
      showJob(currentJobId);
    } else {
      showJob(first);
    }
  }
}

function renderSidebar() {
  const container = document.getElementById('sidebar-jobs');
  container.innerHTML = JOBS.map(job => `
    <div class="sb-job ${job.id === currentJobId ? 'active' : ''}" id="sb-${job.id}" onclick="showJob('${job.id}')">
      <div class="sb-job-head">
        <div class="sb-job-icon">${job.icon}</div>
        <div class="sb-job-info">
          <div class="sb-job-title">${job.title}</div>
          <div class="sb-job-meta">${job.dept.split('·')[0].trim()} · ${job.career}</div>
        </div>
        <div class="sb-job-badge ${job.status === 'closed' ? 'closed' : ''}">${job.status === 'open' ? '채용중' : '마감'}</div>
      </div>
      <div class="sb-job-actions">
        <button class="sb-action-btn sb-action-copy" onclick="copyJob('${job.id}',event)" title="복사">📋</button>
        <button class="sb-action-btn sb-action-del" onclick="deleteJob('${job.id}',event)" title="삭제">🗑</button>
      </div>
    </div>
  `).join('');
}

function renderPanels() {
  const content = document.getElementById('content-area');
  content.innerHTML = JOBS.map(job => renderJobPanel(job)).join('');
}

function renderJobPanel(job) {
  const isAdmin = document.body.classList.contains('admin-mode');
  const editable = isAdmin ? 'contenteditable="true" spellcheck="false"' : '';

  const infoRows = job.infoRows.map(([label, val]) =>
    `<tr><td>${label}</td><td ${editable}>${val}</td></tr>`
  ).join('');

  const chips = job.chips.map(c => `<span class="chip">${c}</span>`).join('');

  const duties = job.duties.map(d =>
    `<div class="duty-item" ${editable}>${d}</div>`
  ).join('');

  const reqItems = job.required.map(r =>
    `<div class="qual-item"><div class="qdot"></div><span ${editable}>${r}</span></div>`
  ).join('');

  const prefItems = job.preferred.map(p =>
    `<div class="qual-item"><div class="qdot"></div><span ${editable}>${p}</span></div>`
  ).join('');

  const benefitCols = job.benefits.map(b =>
    `<div class="benefit-col">
      <div class="bc-title" ${editable}>${b.title}</div>
      ${b.items.map(i => `<div class="bc-card" ${editable}>${i}</div>`).join('')}
    </div>`
  ).join('');

  return `
  <div class="job-panel" id="${job.id}" data-job-id="${job.id}">
    <div class="job-hero">
      <div class="job-hero-orb1"></div><div class="job-hero-orb2"></div>
      <div class="job-hero-badge" ${editable}>${job.badge}</div>
      <div class="job-hero-dept" ${editable}>${job.dept}</div>
      <h1 class="job-hero-title" ${editable}>${job.title}</h1>
      <div class="job-hero-chips" ${editable}>${chips}</div>
    </div>
    <div class="job-body">
      <div class="jb-section">
        <div class="jb-hd"><div class="jb-bar"></div><h2 class="jb-title">공고 정보</h2></div>
        <table class="info-table"><tbody>${infoRows}</tbody></table>
      </div>
      <div class="jb-section">
        <div class="jb-hd"><div class="jb-bar"></div><h2 class="jb-title">회사 소개</h2></div>
        <div class="callout"><div class="callout-icon">✨</div><div ${editable}>${job.companyDesc}</div></div>
      </div>
      <div class="jb-section">
        <div class="jb-hd"><div class="jb-bar"></div><h2 class="jb-title">담당 업무</h2></div>
        <div class="duty-grid">${duties}</div>
      </div>
      <div class="jb-section">
        <div class="jb-hd"><div class="jb-bar"></div><h2 class="jb-title">지원 자격</h2></div>
        <div class="qual-grid">
          <div class="qual-box"><div class="qual-box-head req">필수 요건</div><div class="qual-box-body">${reqItems}</div></div>
          <div class="qual-box"><div class="qual-box-head pref">우대 사항</div><div class="qual-box-body">${prefItems}</div></div>
        </div>
      </div>
      <div class="jb-section">
        <div class="jb-hd"><div class="jb-bar"></div><h2 class="jb-title">복리후생</h2></div>
        <div class="benefit-kanban">${benefitCols}</div>
        <div class="culture-note"><span>💬</span><span ${editable}><strong>인담자 Q&A</strong> — ${job.cultureNote}</span></div>
      </div>
      <div class="jb-section">
        <div class="jb-hd"><div class="jb-bar"></div><h2 class="jb-title">전형 절차</h2></div>
        <div class="proc-wrap"><div style="display:flex;flex-direction:column;gap:0;width:100%;">
          <div class="proc-item"><div class="proc-num n1">📄<div class="proc-step-badge">1</div></div><div class="proc-content"><div class="proc-title" ${editable}>서류 전형</div><div class="proc-sub" ${editable}>이력서 · 자기소개서 · 포트폴리오 파일 첨부 제출</div></div></div>

        <div class="apply-cta-contact" ${editable}>문의 : 현성그룹 인사팀 · 070-4603-1571<br>www.dasancntech.com · www.rubycell.co.kr</div>
      </div>
    </div>
  </div>`;
}

function showJob(jobId) {
  currentJobId = jobId;
  document.querySelectorAll('.job-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(jobId)?.classList.add('active');
  document.querySelectorAll('.sb-job').forEach(j => j.classList.remove('active'));
  document.getElementById('sb-' + jobId)?.classList.add('active');
  const job = JOBS.find(j => j.id === jobId);
  if (job) {
    document.getElementById('breadcrumb-current').textContent = job.title;
    document.getElementById('topbar-apply-link').href = job.tallyUrl || '#';
  }
  document.querySelector('.content')?.scrollTo(0, 0);
}

function openAddModal(copyFrom) {
  const modal = document.getElementById('addModal');
  document.getElementById('addModalTitle').textContent = copyFrom ? '📋 공고 복사' : '➕ 새 공고 추가';
  document.getElementById('add-btn-confirm-label') && (document.querySelector('.add-btn-confirm').textContent = copyFrom ? '📋 복사 추가' : '✅ 공고 추가');

  if (copyFrom) {
    const job = JOBS.find(j => j.id === copyFrom);
    if (job) {
      document.getElementById('f-title').value = job.title + ' (복사)';
      document.getElementById('f-icon').value = job.icon;
      document.getElementById('f-status').value = job.status;
      document.getElementById('f-dept').value = job.dept;
      document.getElementById('f-career').value = job.career;
      document.getElementById('f-badge').value = job.badge;
      document.getElementById('f-tally').value = job.tallyUrl;
      document.getElementById('f-chips').value = job.chips.join(', ');
      document.getElementById('f-duties').value = job.duties.join('\n');
      document.getElementById('f-req').value = job.required.join('\n');
      document.getElementById('f-pref').value = job.preferred.join('\n');
    }
  } else {
    ['f-title','f-icon','f-dept','f-career','f-badge','f-tally','f-chips','f-duties','f-req','f-pref'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('f-icon').value = '📋';
    document.getElementById('f-status').value = 'open';
    document.getElementById('f-tally').value = 'https://tally.so/r/vGJq08';
    document.getElementById('f-chips').value = '🏢 정규직, 💰 면접 후 협의, ⏰ 주5일 09:00–18:00';
  }
  modal.classList.add('show');
}

function closeAddModal() {
  document.getElementById('addModal').classList.remove('show');
}

    infoRows: [

      ['👤 모집 구분', document.getElementById('f-career').value.trim() || '경력 협의'],
      ['🏢 고용형태', '<span class="info-badge green">정규직</span>'],
      ['💰 급여', '<span class="info-badge gold">경력 협의 (희망 연봉 기재 요청)</span>'],
      ['📍 근무지', '서울 강서구 마곡중앙4로 46 (다산 R&D센터)'],
      ['⏰ 근무시간', '주 5일, 09:00~18:00'],
      ['📅 마감일', '<span class="info-badge gold">채용 시 마감 (조기 마감 가능)</span>'],
      ['📞 문의', '현성그룹 인사팀 · 070-4603-1571'],
    ],
    companyDesc: '다산씨엔텍은 <strong>CGMP 인증 화장품 OEM/ODM 전문 R&D 기업</strong>입니다.',
    duties: document.getElementById('f-duties').value.split('\n').map(s => s.trim()).filter(Boolean),
    required: document.getElementById('f-req').value.split('\n').map(s => s.trim()).filter(Boolean),
    preferred: document.getElementById('f-pref').value.split('\n').map(s => s.trim()).filter(Boolean),
    benefits: [
      {title:'🛡 급여 & 보험', items:['✅ 4대보험 완비','💼 퇴직연금','🏆 연 1회 인센티브']},
      {title:'🏖 휴가 & 여가', items:['📅 자유 연차','🏨 대명리조트 이용','🔄 장기근속 Refresh','🍼 출산·육아휴직']},
      {title:'📚 교육 & 성장', items:['🎓 OJT 교육','📖 도서 구매비','💡 직무 교육비']},
      {title:'🏢 근무 환경', items:['👔 자율 복장','🚗 주차 무료']},
    ],

  JOBS.push(newJob);
  closeAddModal();
  currentJobId = newJob.id;
  renderAll();
  // 관리자 모드 유지
  document.body.classList.add('admin-mode');
  document.getElementById('adminBar').classList.add('show');
  enableEditables();
  showToast('✅ 공고가 추가됐습니다. 내용을 클릭해서 수정하세요.', 3500);
}

// ════════════════════════════════════════
// 관리자: 공고 복사 / 삭제
// ════════════════════════════════════════
function copyJob(jobId, e) {
  e.stopPropagation();
  openAddModal(jobId);
}

function deleteJob(jobId, e) {
  e.stopPropagation();
  const job = JOBS.find(j => j.id === jobId);
  if (!confirm(`"${job?.title}" 공고를 삭제하시겠습니까?\n이 작업은 저장 후 반영됩니다.`)) return;
  JOBS = JOBS.filter(j => j.id !== jobId);
  if (currentJobId === jobId) currentJobId = JOBS[0]?.id || null;
  renderAll();
  document.body.classList.add('admin-mode');
  document.getElementById('adminBar').classList.add('show');
  enableEditables();
  showToast('🗑 공고가 삭제됐습니다.');
}

// ════════════════════════════════════════
// 관리자: 비밀번호 / 진입 / 종료
// ════════════════════════════════════════
function openPwModal() {
  document.getElementById('pwModal').classList.add('show');
  document.getElementById('pwInput').value = '';
  document.getElementById('pwError').textContent = '';
  setTimeout(() => document.getElementById('pwInput').focus(), 100);
}
function closePwModal() { document.getElementById('pwModal').classList.remove('show'); }
function checkPw() {
  if (document.getElementById('pwInput').value === ADMIN_PASSWORD) {
    closePwModal();
    enterAdmin();
  } else {
    document.getElementById('pwError').textContent = '비밀번호가 틀렸습니다.';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}

function enterAdmin() {
  document.body.classList.add('admin-mode');
  document.getElementById('adminBar').classList.add('show');
  renderAll(); // contenteditable 포함해서 다시 렌더링
  enableEditables();
  showToast('✏️ 편집 모드 시작. 텍스트를 클릭해서 수정하고 공고를 추가·삭제·복사하세요!', 4000);
}

function enableEditables() {
  document.querySelectorAll('[contenteditable]').forEach(el => {
    el.setAttribute('spellcheck', 'false');
  });
}

function exitAdmin() {
  document.body.classList.remove('admin-mode');
  document.getElementById('adminBar').classList.remove('show');
  renderAll(); // contenteditable 없이 다시 렌더링
  showToast('편집 모드 종료');
}

// ════════════════════════════════════════
// 저장 (HTML 다운로드)
// ════════════════════════════════════════
function saveFile() {
  // 현재 편집된 내용을 JOBS 데이터에 동기화
  syncEditedContent();

  // admin-mode 없이 새로 렌더링한 HTML 생성
  const cloned = document.documentElement.cloneNode(true);

  // JOBS 데이터를 최신 상태로 스크립트에 반영
  const scripts = cloned.querySelectorAll('script');
  scripts.forEach(s => {
    if (s.textContent.includes('let JOBS =')) {
      s.textContent = s.textContent.replace(
        /let JOBS = \[[\s\S]*?\];/,
        'let JOBS = ' + JSON.stringify(JOBS, null, 2) + ';'
      );
    }
  });

  // admin 상태 클리어
  cloned.body.classList.remove('admin-mode');
  cloned.querySelector('#adminBar')?.classList.remove('show');
  cloned.querySelectorAll('[contenteditable]').forEach(el => {
    el.removeAttribute('contenteditable');
    el.removeAttribute('spellcheck');
  });

  const html = '<!DOCTYPE html>\n' + cloned.outerHTML;
  const blob = new Blob([html], {type:'text/html;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'careers_hub_V4.html';
  a.click();
  URL.revokeObjectURL(url);
  showToast('✅ 저장 완료! 파일을 GitHub에 업로드하면 반영됩니다.', 4000);
}

function syncEditedContent() {
  // 현재 DOM에서 편집된 내용을 JOBS 배열에 동기화
  JOBS.forEach(job => {
    const panel = document.getElementById(job.id);
    if (!panel) return;

    // 제목
    const titleEl = panel.querySelector('.job-hero-title');
    if (titleEl) job.title = titleEl.innerHTML;

    // 부서
    const deptEl = panel.querySelector('.job-hero-dept');
    if (deptEl) job.dept = deptEl.innerHTML;

    // 배지
    const badgeEl = panel.querySelector('.job-hero-badge');
    if (badgeEl) job.badge = badgeEl.innerHTML;

    // 업무
    const dutyEls = panel.querySelectorAll('.duty-item');
    if (dutyEls.length) job.duties = [...dutyEls].map(el => el.innerHTML.replace(/^▸\s*/, '').trim());

    // 문화노트
    const cultureEl = panel.querySelector('.culture-note > span:last-child');
    if (cultureEl) job.cultureNote = cultureEl.innerHTML.replace(/<strong>.*?<\/strong>\s*—\s*/, '');

    // 회사소개
    const companyEl = panel.querySelector('.callout > div:last-child');
    if (companyEl) job.companyDesc = companyEl.innerHTML;

    // 필수/우대
    const reqEls = panel.querySelectorAll('.qual-box:first-of-type .qual-item span');
    if (reqEls.length) job.required = [...reqEls].map(el => el.innerHTML.trim());
    const prefEls = panel.querySelectorAll('.qual-box:last-of-type .qual-item span');
    if (prefEls.length) job.preferred = [...prefEls].map(el => el.innerHTML.trim());

    // 공고 정보 테이블
    const rows = panel.querySelectorAll('.info-table tr');
    if (rows.length) {
      job.infoRows = [...rows].map(tr => {
        const cells = tr.querySelectorAll('td');
        return [cells[0]?.innerHTML || '', cells[1]?.innerHTML || ''];
      });
    }

    // bc-card
    const bcCols = panel.querySelectorAll('.benefit-col');
    job.benefits = [...bcCols].map(col => ({
      title: col.querySelector('.bc-title')?.innerHTML || '',
      items: [...col.querySelectorAll('.bc-card')].map(c => c.innerHTML)
    }));
  });
}

// ════════════════════════════════════════
// 토스트
// ════════════════════════════════════════
function showToast(msg, dur=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

// ════════════════════════════════════════
// 초기화
// ════════════════════════════════════════
renderAll();
</script>
